name: Deploy FitFeast Frontend

on:
  push:
    branches:
      - main  # ඔයා push කරන්නේ 'main' branch එකට නම් විතරක් මේක වැඩ කරයි

jobs:
  web-deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
      # 1. GitHub එකේ තියෙන ඔයාගේ කෝඩ් එක මෙතනට ගන්නවා
      - name: 🚚 Get latest code
        uses: actions/checkout@v4

      # 2. Node.js පරිසරය සකස් කරනවා
      - name: 🛠️ Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Hostinger එකට ගැලපෙන ස්ටේබල් වර්ෂන් එකක්

      # 3. Frontend එක Build කරනවා
      - name: 📦 Install and Build Frontend
        run: |
          cd fitfeast-app-frontend
          npm install
          npm run build

      # 4. හැදුණු 'dist' ෆෝල්ඩර් එක FTP හරහා Hostinger එකට යවනවා
      - name: 🚀 Deploy to Hostinger via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Vite පාවිච්චි කරනවා නම් 'dist', React Scripts නම් 'build' ලෙස වෙනස් කරන්න
          local-dir: ./fitfeast-app-frontend/dist/
          # Hostinger එකේ වෙබ් එක තියෙන්න ඕන තැන (සාමාන්‍යයෙන් public_html)
          server-dir: /public_html/
          # කලින් තිබුණ පරණ ෆයිල් මකන්න ඕන නැති නිසා මේක false තියන්න
          delete-destination: false